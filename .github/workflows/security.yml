name: Security Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run publish safety check
        run: npm run check:publish-safety

      - name: Run security regression checks
        run: npm run check:security

      - name: Run harness compatibility checks
        run: npm run check:compat
